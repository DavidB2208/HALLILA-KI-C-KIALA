<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HALLILA — Tiers List Maker</title>
<style>
  :root{
    --bg:#121214;
    --panel:#0b0b0d;
    --panel-2:#121216;
    --line:rgba(255,255,255,.1);
    --line-2:rgba(255,255,255,.18);
    --text:#f5f5f5;
    --muted:rgba(255,255,255,.72);
    --muted-2:rgba(255,255,255,.5);
    --shadow:0 24px 60px rgba(0,0,0,.35);
    --S:#e65a5a;
    --A:#e6b751;
    --B:#cad157;
    --C:#7ec84f;
    --D:#83d8d9;
    --E:#9147d8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at center, rgba(65,65,65,.34) 0%, rgba(18,18,22,.22) 25%, rgba(6,6,8,.96) 72%),
      linear-gradient(180deg,#1b1b1f 0%, #09090b 100%);
    overflow:hidden;
  }
  button,input,textarea{font:inherit}
  #app{height:100%}
  .page{
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(circle at center, rgba(85,85,85,.18) 0%, rgba(18,18,20,.1) 26%, rgba(7,7,9,.92) 74%),
      linear-gradient(180deg,rgba(20,20,24,.96),rgba(6,6,8,.99));
  }
  .page-label{
    padding:16px 26px 8px;
    font-size:clamp(18px,1.8vw,24px);
    color:var(--muted-2);
    letter-spacing:.01em;
    flex:0 0 auto;
  }
  .surface{
    flex:1;
    min-height:0;
    margin:0 22px 22px;
    border:1px solid rgba(255,255,255,.05);
    background:
      radial-gradient(circle at center, rgba(72,72,72,.2) 0%, rgba(14,14,18,.12) 24%, rgba(7,7,9,.96) 72%),
      linear-gradient(180deg,#111114 0%, #060608 100%);
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .surface::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at center, rgba(255,255,255,.05) 0, transparent 30%),
      linear-gradient(90deg, transparent 0%, rgba(255,255,255,.015) 50%, transparent 100%);
    pointer-events:none;
  }
  .screen{
    position:relative;
    z-index:1;
    height:100%;
    display:flex;
    flex-direction:column;
    padding:32px clamp(18px,4vw,56px) 28px;
    gap:24px;
  }
  .topbar{
    display:grid;
    grid-template-columns:auto 1fr auto;
    align-items:start;
    gap:18px;
  }
  .brand-wrap{
    text-align:center;
    align-self:start;
    justify-self:center;
  }
  .brand{
    margin:0;
    font-size:clamp(56px,8vw,108px);
    line-height:.88;
    font-weight:900;
    letter-spacing:.03em;
  }
  .brand-sub{
    margin:0;
    font-size:clamp(20px,2.4vw,44px);
    line-height:1;
    font-weight:800;
  }
  .ghost-btn,.primary-btn,.small-btn,.swatch,.quick-btn{
    border:2px solid rgba(255,255,255,.92);
    color:var(--text);
    background:transparent;
    border-radius:14px;
    cursor:pointer;
    transition:.15s ease;
  }
  .ghost-btn:hover,.primary-btn:hover,.small-btn:hover,.swatch:hover,.quick-btn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,.06);
  }
  .small-btn{
    padding:10px 16px;
    font-size:clamp(16px,1.3vw,22px);
    line-height:1;
    white-space:nowrap;
  }
  .primary-btn,.ghost-btn{
    padding:20px 28px;
    font-size:clamp(22px,2.8vw,34px);
    min-width:min(92vw,560px);
  }
  .primary-btn{background:rgba(255,255,255,.05)}
  .small-btn[disabled],.primary-btn[disabled]{opacity:.35;cursor:not-allowed;transform:none}
  .center-stack{
    flex:1;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    gap:24px;
  }
  .two-actions{display:flex;gap:22px;flex-wrap:wrap;justify-content:center}
  .big-copy{width:min(100%,860px);display:grid;gap:14px}
  .title-big{
    margin:0;
    font-size:clamp(34px,4.6vw,64px);
    font-weight:500;
  }
  .subtle{color:var(--muted)}
  .subtle-2{color:var(--muted-2)}
  .form-card,.info-card,.join-card,.detail-card,.share-box,.history-card,.board-card{
    width:min(100%,860px);
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.03);
    border-radius:22px;
    padding:22px;
    box-shadow:0 10px 24px rgba(0,0,0,.15);
  }
  .form-grid{display:grid;gap:16px}
  .text-input,.text-area{
    width:100%;
    border-radius:16px;
    border:2px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.02);
    color:var(--text);
    padding:18px 20px;
    font-size:clamp(18px,2vw,30px);
    outline:none;
  }
  .text-area{min-height:120px;resize:vertical}
  .row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    align-items:center;
  }
  .meta-side{
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:flex-end;
    text-align:right;
    min-width:160px;
  }
  .players-count{
    font-size:clamp(28px,3vw,52px);
    line-height:1;
  }
  .players-grid{
    width:min(100%,980px);
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:18px;
  }
  .player-pill{
    display:grid;
    grid-template-columns:88px 1fr;
    min-height:86px;
    overflow:hidden;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
  }
  .player-pill .avatar{
    background:
      linear-gradient(45deg, rgba(255,255,255,.22) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,.22) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,.22) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.22) 75%);
    background-size:24px 24px;
    background-position:0 0,0 12px,12px -12px,-12px 0;
    opacity:.8;
  }
  .player-pill .label{
    display:flex;align-items:center;justify-content:center;
    padding:12px;font-size:clamp(24px,2.2vw,38px);font-weight:500;
    color:#fff;
  }
  .state-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:112px;
    height:112px;
    border-radius:999px;
    border:4px solid rgba(255,255,255,.9);
    font-size:clamp(26px,2.8vw,42px);
  }
  .share-url{
    width:100%;
    border:none;
    border-radius:16px;
    padding:16px 18px;
    background:rgba(255,255,255,.06);
    color:var(--text);
    font-size:clamp(15px,1.4vw,20px);
  }
  .section-title{
    margin:0;
    font-size:clamp(28px,4vw,56px);
    font-weight:500;
  }
  .color-grid{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
  }
  .swatch{
    width:52px;height:52px;border-radius:999px;border-width:3px;
  }
  .swatch.active{transform:scale(1.08); box-shadow:0 0 0 4px rgba(255,255,255,.12)}
  .main-grid{
    flex:1;
    min-height:0;
    display:grid;
    grid-template-columns:minmax(0,1fr) 320px;
    gap:22px;
  }
  .board-wrap{
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .pool-zone,.tier-drop{
    min-height:92px;
    border-radius:20px;
    border:2px dashed rgba(255,255,255,.1);
    background:rgba(255,255,255,.025);
    padding:14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-content:flex-start;
  }
  .pool-zone.drag-over,.tier-drop.drag-over{border-color:rgba(255,255,255,.42); background:rgba(255,255,255,.045)}
  .tier-row{
    display:grid;
    grid-template-columns:90px 1fr;
    gap:14px;
    align-items:stretch;
  }
  .tier-badge{
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:clamp(34px,3vw,48px);
    font-weight:900;
    color:#fff;
    min-height:94px;
  }
  .person-card{
    min-width:150px;
    border-radius:18px;
    border:3px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    padding:12px;
    cursor:grab;
    display:flex;
    flex-direction:column;
    gap:10px;
    box-shadow:0 6px 12px rgba(0,0,0,.12);
  }
  .person-card.dragging{opacity:.45}
  .person-name{
    font-size:clamp(18px,1.4vw,24px);
    font-weight:700;
  }
  .quick-actions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .quick-btn{
    min-width:36px;
    padding:6px 10px;
    font-size:14px;
    border-color:rgba(255,255,255,.35);
  }
  .quick-btn.clear{min-width:46px}
  .side-stack{
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .detail-card{width:100%}
  .score-list{
    display:grid;
    gap:10px;
    font-size:15px;
    color:var(--muted);
  }
  .submit-btn{
    width:100%;
    min-width:0;
  }
  .results-wrap{
    flex:1;
    min-height:0;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:16px;
    padding-right:6px;
  }
  .result-row{
    display:grid;
    grid-template-columns:82px 1fr;
    gap:14px;
    align-items:stretch;
  }
  .result-track{
    border-radius:18px;
    border:1px solid rgba(255,255,255,.06);
    background:rgba(255,255,255,.03);
    padding:12px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    min-height:84px;
    align-content:flex-start;
  }
  .score-chip{
    min-width:152px;
    border-radius:16px;
    border:2px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.04);
    padding:12px 14px;
  }
  .score-chip strong{display:block;font-size:22px}
  .history-grid{
    flex:1;
    min-height:0;
    overflow:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
    gap:22px;
    padding-bottom:10px;
  }
  .history-card{width:auto;display:grid;gap:14px}
  .mini-row{
    display:grid;
    grid-template-columns:36px 1fr;
    gap:8px;
    align-items:center;
  }
  .mini-badge{
    width:36px;height:30px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;
  }
  .mini-track{
    min-height:28px;border-radius:8px;background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    display:flex;align-items:center;gap:6px;padding:4px 8px;overflow:hidden
  }
  .mini-block{
    width:18px;height:18px;border-radius:4px;background:rgba(255,255,255,.14)
  }
  .history-actions{
    display:flex;gap:10px;flex-wrap:wrap
  }
  .label-top{font-size:14px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.08em}
  .waiting-list{
    width:min(100%,720px);
    display:grid;gap:12px;
  }
  .waiting-row{
    display:flex;justify-content:space-between;align-items:center;
    gap:14px;border-radius:14px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
  }
  .tag{
    padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.15);font-size:14px;color:var(--muted)
  }
  .linkish{
    color:var(--text);
    text-decoration:underline;
    cursor:pointer;
  }
  .footer-note{color:var(--muted-2);font-size:14px}
  @media (max-width: 980px){
    .main-grid{grid-template-columns:1fr}
    .meta-side{min-width:0}
  }
  @media (max-width: 720px){
    .surface{margin:0}
    .page-label{padding:12px 14px 8px}
    .screen{padding:16px 14px 18px}
    .topbar{grid-template-columns:1fr;justify-items:center}
    .meta-side{align-items:center;text-align:center}
    .tier-row{grid-template-columns:1fr}
    .tier-badge{min-height:72px}
    .person-card{min-width:132px}
    .state-pill{width:92px;height:92px}
    .share-url{font-size:14px}
  }

/* ===== V2 compact + animations ===== */
html,body{min-height:100%}
body{overflow:auto}
#app{min-height:100vh}
.page{min-height:100vh;height:auto;animation:fadeUp .35s ease both}
.surface{
  margin:0 14px 14px;
  overflow:auto;
  border-radius:0;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.18) transparent;
}
.surface::-webkit-scrollbar,.results-wrap::-webkit-scrollbar,.history-grid-wrap::-webkit-scrollbar,.board-wrap::-webkit-scrollbar{width:10px;height:10px}
.surface::-webkit-scrollbar-thumb,.results-wrap::-webkit-scrollbar-thumb,.history-grid-wrap::-webkit-scrollbar-thumb,.board-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:999px}
.screen{
  min-height:100%;
  padding:22px clamp(14px,2.4vw,36px) 18px;
  gap:18px;
}
.topbar{gap:14px}
.brand{font-size:clamp(44px,6.2vw,92px)}
.brand-sub{font-size:clamp(18px,1.9vw,30px)}
.page-label{padding:14px 20px 6px;font-size:clamp(16px,1.5vw,22px)}
.primary-btn,.ghost-btn{padding:16px 22px;font-size:clamp(20px,2vw,30px);min-width:min(90vw,440px)}
.small-btn{padding:9px 14px;font-size:clamp(14px,1.1vw,20px)}
.center-stack{gap:18px}
.form-card,.info-card,.join-card,.detail-card,.share-box,.history-card,.board-card{padding:18px;border-radius:18px}
.title-big{font-size:clamp(28px,3.6vw,52px)}
.players-grid{width:min(100%,900px);grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.player-pill{grid-template-columns:58px 1fr;min-height:66px;border-radius:14px}
.player-pill .label{font-size:clamp(18px,1.6vw,28px)}
.players-count{font-size:clamp(22px,2.2vw,40px)}
.main-grid{grid-template-columns:minmax(0,1fr) 260px;gap:16px}
.board-wrap{gap:10px;overflow:auto;padding-right:4px}
.pool-zone,.tier-drop{
  min-height:64px;
  padding:8px 10px;
  gap:8px;
  border-radius:16px;
}
.tier-row{grid-template-columns:62px 1fr;gap:10px}
.tier-badge{
  min-height:66px;
  border-radius:14px;
  font-size:clamp(26px,2.2vw,38px);
}
.person-card{
  min-width:104px;
  border-radius:14px;
  padding:8px 10px;
  gap:8px;
}
.person-name{font-size:14px}
.quick-actions{gap:6px}
.quick-btn{
  min-width:28px;
  padding:4px 6px;
  font-size:11px;
  border-radius:8px;
}
.quick-btn.clear{min-width:34px}
.detail-card .label-top{margin-bottom:8px}
.detail-card{border-radius:18px}
.submit-btn{padding:14px 18px;font-size:clamp(18px,1.8vw,24px)}
.score-list{gap:8px;font-size:14px}
.state-pill{min-width:92px;height:92px;border-width:3px;font-size:clamp(22px,2vw,34px);animation:softPulse 1.9s infinite}
.results-wrap{padding-right:2px}
.result-row{grid-template-columns:68px 1fr;gap:10px}
.result-track{min-height:72px;padding:10px;border-radius:14px}
.score-chip{min-width:132px;border-radius:12px;padding:10px 12px}
.score-chip strong{font-size:18px}
.history-screen{gap:14px}
.history-topbar{grid-template-columns:auto 1fr auto}
.history-grid-wrap{
  flex:1;
  min-height:0;
  overflow:auto;
  display:flex;
  justify-content:center;
  padding:2px 0 12px;
}
.history-grid{
  width:min(100%,940px);
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:22px;
  align-content:start;
}
.history-card{
  width:auto;
  display:grid;
  gap:12px;
  min-height:250px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.history-card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 34px rgba(0,0,0,.24);
  border-color:rgba(255,255,255,.14);
}
.history-mini-board{
  display:grid;
  gap:7px;
  padding:2px 0 0;
}
.history-card-title{
  font-size:16px;
  font-weight:500;
  line-height:1.25;
}
.history-card-meta{
  font-size:12px;
  color:var(--muted-2);
}
.mini-row{grid-template-columns:28px 1fr;gap:6px}
.mini-badge{width:28px;height:24px;border-radius:6px;font-size:18px}
.mini-track{
  min-height:24px;
  border-radius:6px;
  padding:4px 6px;
  gap:5px;
}
.mini-block{
  width:16px;
  height:16px;
  border-radius:3px;
}
.history-actions{margin-top:auto;display:flex;gap:8px;flex-wrap:wrap}
.waiting-list{width:min(100%,620px)}
.waiting-row{padding:12px 14px}
.footer-note{font-size:13px}
.small-btn,.primary-btn,.ghost-btn,.swatch,.quick-btn,.person-card,.history-card,.score-chip,.player-pill{transition:transform .18s ease, background .18s ease, box-shadow .18s ease, border-color .18s ease}
.person-card:hover{transform:translateY(-2px); box-shadow:0 10px 18px rgba(0,0,0,.18)}
.score-chip:hover,.player-pill:hover{transform:translateY(-2px)}
.brand-wrap,.center-stack,.main-grid,.results-wrap,.history-grid,.share-box,.join-card,.form-card{animation:fadeUp .45s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes softPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.1)}50%{box-shadow:0 0 0 12px rgba(255,255,255,0)}}
@media (max-width: 1100px){
  .main-grid{grid-template-columns:1fr}
  .meta-side{min-width:0}
}
@media (max-width: 760px){
  .surface{margin:0}
  .screen{padding:14px 12px 16px}
  .topbar{grid-template-columns:1fr;justify-items:center}
  .meta-side{align-items:center;text-align:center}
  .history-grid{grid-template-columns:1fr}
  .person-card{min-width:90px}
  .tier-row{grid-template-columns:1fr}
  .tier-badge{min-height:54px}
}

</style>
</head>
<body>
<div id="app"></div>
<script>
(() => {
  const APP_TITLE = 'HALLILA';
  const STORAGE_KEY = 'hallila_final_rooms_v3';
  const HISTORY_KEY = 'hallila_final_history_v3';
  const ITEMS = ['Isaac', 'Liam', 'Ariel', 'Samuel', 'Nathan', 'Alex', 'Eitan', 'Gabriel', 'Adam', 'David'];
  const TIERS = ['S', 'A', 'B', 'C', 'D', 'E'];
  const TIER_POINTS = { S: 5, A: 4, B: 3, C: 2, D: 1, E: 0 };
  const TIER_COLORS = { S: '#e65a5a', A: '#e6b751', B: '#cad157', C: '#7ec84f', D: '#83d8d9', E: '#9147d8' };
  const PLAYER_COLORS = ['#e65a5a', '#e6b751', '#83d8d9', '#7ec84f', '#cad157', '#6ea8ff', '#f07ac4', '#8b6df3', '#f08f5a', '#53d1a8'];
  const bc = 'BroadcastChannel' in window ? new BroadcastChannel('hallila_sync_v3') : null;

  const ui = {
    createTheme: '',
    createHistoryTitle: '',
    joinPseudo: '',
    joinColor: PLAYER_COLORS[0],
    draftDragItem: null
  };

  const app = document.getElementById('app');
  const ADMIN_FLAG = 'hallila_admin_access_v3';

  function uid(prefix) {
    return prefix + '_' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (m) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[m]));
  }

  function getSearch() {
    return new URLSearchParams(window.location.search);
  }

  function setUrl(params = {}, hash = '') {
    const url = new URL(window.location.href);
    url.search = '';
    Object.entries(params).forEach(([k, v]) => {
      if (v !== null && v !== undefined && v !== '') url.searchParams.set(k, v);
    });
    url.hash = hash || '';
    history.replaceState({}, '', url.toString());
  }

  }

  function loadHistory() {

      return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    } catch {

  }

  function saveDraft(roomId, playerId, draft) {

  }

  function clearDraft(roomId, playerId) {

    const admin = search.get('admin');
    const playerId = search.get('player');
    const room = roomId ? rooms[roomId] : null;
    const joinRoom = joinId ? rooms[joinId] : null;
    const isAdmin = !!(room && admin && room.adminToken === admin);
    const player = room && playerId ? room.players.find((p) => p.id === playerId) : null;
    return { search, rooms, roomId, joinId, admin, playerId, room, joinRoom, isAdmin, player, hash: window.location.hash || '', hasAdminAccess };

  function normalizePseudo(room, pseudo) {
    const trimmed = pseudo.trim();
    if (!trimmed) return '';
    let name = trimmed;
    let n = 2;
    const existing = new Set(room.players.map((p) => p.pseudo.toLowerCase()));
    while (existing.has(name.toLowerCase())) {
      name = `${trimmed} (${n++})`;
    }
    return name;
  }

  function createRoom({ theme, historyTitle }) {
    const rooms = loadRooms();
    const roomId = uid('room');
    const adminToken = uid('admin');
    const cleanTheme = theme.trim();
    const title = historyTitle.trim() || `Résultat — ${cleanTheme}`;
    rooms[roomId] = {
      id: roomId,
      adminToken,
      theme: cleanTheme,
      historyTitle: title,
      status: 'lobby',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      players: [],
      rankings: {},
      finalResults: [],
      historySaved: false
    };
    saveRooms(rooms);
    sessionStorage.setItem(ADMIN_FLAG, '1');
    setUrl({ room: roomId, admin: adminToken }, '');
    render();
  }

  function joinRoom(roomId, pseudo, color) {
    const rooms = loadRooms();
    const room = rooms[roomId];
    if (!room) return { ok: false, message: 'Partie introuvable.' };
    if (room.status !== 'lobby') return { ok: false, message: 'La partie a déjà commencé.' };
    const cleanPseudo = normalizePseudo(room, pseudo);
    if (!cleanPseudo) return { ok: false, message: 'Entre un pseudo valide.' };
    const playerId = uid('player');
    room.players.push({
      id: playerId,
      pseudo: cleanPseudo,
      color: color || PLAYER_COLORS[0],
      joinedAt: new Date().toISOString(),
      submittedAt: null
    });
    room.updatedAt = new Date().toISOString();
    rooms[roomId] = room;
    saveRooms(rooms);
    sessionStorage.setItem('hallila_role_v3', 'player');
    setUrl({ room: roomId, player: playerId }, '');
    render();
    return { ok: true };
  }

  function leaveRoom(roomId, playerId) {
    const rooms = loadRooms();
    const room = rooms[roomId];
    if (!room) return;
    room.players = room.players.filter((p) => p.id !== playerId);
    delete room.rankings[playerId];
    clearDraft(roomId, playerId);
    room.updatedAt = new Date().toISOString();
    rooms[roomId] = room;
    saveRooms(rooms);
    goHome();
  }

  function startRoom(roomId) {
    const rooms = loadRooms();
    const room = rooms[roomId];
    if (!room) return;
    if (!room.players.length) return;
    room.status = 'ranking';
    room.updatedAt = new Date().toISOString();
    rooms[roomId] = room;
    saveRooms(rooms);
  }

  function computeFinalResults(room) {
    const totalPlayers = room.players.length;
    const results = ITEMS.map((name) => {
      let sum = 0;
      const distribution = { S: 0, A: 0, B: 0, C: 0, D: 0, E: 0 };
      room.players.forEach((player) => {
        const ranking = room.rankings[player.id] || {};
        const tier = ranking[name] || 'E';
        sum += TIER_POINTS[tier] || 0;
        distribution[tier] += 1;
      });
      const averagePoints = totalPlayers ? sum / totalPlayers : 0;
      const score = totalPlayers ? ((averagePoints / 5) * 100) : 0;
      let finalTier = 'E';
      if (score >= 95) finalTier = 'S';
      else if (score >= 80) finalTier = 'A';
      else if (score >= 60) finalTier = 'B';
      else if (score >= 35) finalTier = 'C';
      else if (score >= 15) finalTier = 'D';
      return {
        name,
        sum,
        averagePoints: Number(averagePoints.toFixed(2)),
        score: Number(score.toFixed(2)),
        finalTier,
        distribution
      };
    });
    results.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'fr'));
    return results;
  }

  function saveRoomToHistory(room) {
    const history = loadHistory();
    const existingIndex = history.findIndex((entry) => entry.roomId === room.id);
    const payload = {
      id: existingIndex >= 0 ? history[existingIndex].id : uid('history'),
      roomId: room.id,
      title: room.historyTitle || `Résultat — ${room.theme}`,
      theme: room.theme,
      playersCount: room.players.length,
      createdAt: room.createdAt,
      completedAt: room.completedAt || new Date().toISOString(),
      results: room.finalResults
    };
    if (existingIndex >= 0) history[existingIndex] = payload;
    else history.unshift(payload);
    saveHistoryEntries(history);
  }

  function submitDraft(roomId, playerId) {
    const rooms = loadRooms();
    const room = rooms[roomId];
    if (!room) return { ok: false, message: 'Partie introuvable.' };
    const draft = loadDraft(roomId, playerId);
    const missing = ITEMS.filter((item) => !draft[item]);
    if (missing.length) return { ok: false, message: 'Classe tous les noms avant de valider.' };
    room.rankings[playerId] = { ...draft };
    const player = room.players.find((p) => p.id === playerId);
    if (player) player.submittedAt = new Date().toISOString();
    const allSubmitted = room.players.length > 0 && room.players.every((p) => !!room.rankings[p.id]);
    if (allSubmitted) {
      room.status = 'results';
      room.completedAt = new Date().toISOString();
      room.finalResults = computeFinalResults(room);
      room.historySaved = true;
      saveRoomToHistory(room);
    }
    room.updatedAt = new Date().toISOString();
    rooms[roomId] = room;
    saveRooms(rooms);
    clearDraft(roomId, playerId);
    render();
    return { ok: true };
  }

  function updateDraftPlacement(roomId, playerId, item, tier) {
    const draft = loadDraft(roomId, playerId);
    if (tier === 'UNASSIGNED' || !tier) delete draft[item];
    else draft[item] = tier;
    saveDraft(roomId, playerId, draft);
    render();
  }

  function updateHistoryTitle(entryId, title) {
    const clean = (title || '').trim();
    if (!clean) return;
    const history = loadHistory();
    const entry = history.find((item) => item.id === entryId);
    if (!entry) return;
    entry.title = clean;
    saveHistoryEntries(history);

    const rooms = loadRooms();
    const room = Object.values(rooms).find((r) => r.id === entry.roomId);
    if (room) {
      room.historyTitle = clean;
      room.updatedAt = new Date().toISOString();
      rooms[room.id] = room;
      saveRooms(rooms);
    }
    render();
  }

                    <div class="tag">${player.submittedAt ? 'Tier list envoyée' : 'En cours'}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderPlayerWaiting(room, player) {
    const submitted = room.players.filter((p) => p.submittedAt).length;
    const everyoneDone = room.status === 'results';
    return `
      <div class="page">
        <div class="page-label">Attente</div>
        <div class="surface">
          <div class="screen">
            <div class="topbar">
              <button class="small-btn" data-action="go-home">Accueil</button>
              <div class="brand-wrap">
                <h1 class="brand" style="font-size:clamp(52px,6vw,88px)">${APP_TITLE}</h1>
                <p class="brand-sub" style="font-size:clamp(18px,2vw,32px)">Tiers List Maker</p>
              </div>
              <div class="meta-side">
                <div class="state-pill">${submitted}/${room.players.length}</div>
                <div class="subtle">${escapeHtml(player.pseudo)}</div>
              </div>
            </div>

            <div class="center-stack">
              <h2 class="title-big">${everyoneDone ? 'Terminé' : 'En attente des autres joueurs...'}</h2>
              <div class="info-card" style="text-align:center">
                <div class="label-top">Thème</div>
                <div style="font-size:clamp(28px,3.6vw,46px);font-weight:800">${escapeHtml(room.theme)}</div>
                <div class="subtle" style="margin-top:8px">${everyoneDone ? "Le résultat final s'affiche seulement sur l'écran admin." : "Ta tier list est envoyée. Patiente pendant que les autres finissent."}</div>
              </div>
              ${renderPlayerPills(room.players, true)}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderAdminResults(room) {
    return `
      <div class="page">
        <div class="page-label">Résultat final</div>
        <div class="surface">
          <div class="screen">
            <div class="topbar">
              <button class="small-btn" data-action="go-history">Historique</button>
              <div class="brand-wrap">
                <h1 class="brand" style="font-size:clamp(52px,6vw,88px)">${APP_TITLE}</h1>
                <p class="brand-sub" style="font-size:clamp(18px,2vw,32px)">Tiers List Maker</p>
              </div>
              <div class="meta-side">
                <div class="players-count">${room.players.length} joueurs</div>
                <div class="subtle">Enregistré dans l'historique</div>
              </div>
            </div>

            <div class="row" style="justify-content:space-between">
              <div>
                <div class="label-top">Thème</div>
                <div style="font-size:clamp(28px,3.6vw,48px);font-weight:800">${escapeHtml(room.theme)}</div>
              </div>
              <div class="row">
                <button class="small-btn" data-action="edit-room-history-title">Modifier le titre historique</button>
                <button class="small-btn" data-action="go-home">Nouvelle partie</button>
              </div>
            </div>

            <div class="results-wrap">
              ${TIERS.map((tier) => {
                const rows = room.finalResults.filter((item) => item.finalTier === tier);
                return `
                  <div class="result-row">
                    <div class="tier-badge" style="background:${TIER_COLORS[tier]}">${tier}</div>
                    <div class="result-track">
                      ${rows.length ? rows.map((item) => `
                        <div class="score-chip">
                          <strong>${escapeHtml(item.name)}</strong>
                          <div>${item.score}%</div>
                          <div class="subtle-2">Somme : ${item.sum} pts</div>
                        </div>
                      `).join('') : '<div class="subtle">Aucun joueur ici.</div>'}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderHistory() {
    const history = loadHistory();
    const emptyCards = Array.from({ length: 3 }).map((_, index) => `
      <div class="history-card">
        <div class="history-mini-board">
          ${miniHistoryRows([])}
        </div>
        <div class="history-card-title">Aucune partie sauvegardée</div>
        <div class="history-card-meta">Lance une partie pour remplir cet historique.</div>
        <div class="history-actions">
          ${index === 0 ? '<button class="small-btn" data-action="go-create">Créer une partie</button>' : ''}
        </div>
      </div>
    `).join('');

    return `
      <div class="page">
        <div class="page-label">Historiques</div>
        <div class="surface">
          <div class="screen history-screen">
            <div class="topbar history-topbar">
              <button class="small-btn" data-action="go-home">Retour</button>
              <div class="brand-wrap">
                <h1 class="brand" style="font-size:clamp(48px,5.5vw,76px)">${APP_TITLE}</h1>
                <p class="brand-sub" style="font-size:clamp(16px,1.8vw,26px)">Tiers List Maker</p>
              </div>
              <div style="width:96px"></div>
            </div>

            <div class="row" style="justify-content:center;margin-top:4px">
              <h2 class="title-big" style="font-size:clamp(26px,3vw,44px)">Historique</h2>
            </div>

            <div class="history-grid-wrap">
              <div class="history-grid">
                ${history.length ? history.map((entry) => `
                  <div class="history-card">
                    <div class="history-mini-board">
                      ${miniHistoryRows(entry.results)}
                    </div>
                    <div class="history-card-title">${escapeHtml(entry.title)}</div>
                    <div class="history-card-meta">${entry.playersCount} joueurs · ${formatDate(entry.completedAt)}</div>
                    <div class="history-actions">
                      <button class="small-btn" data-history-open="${entry.id}">Ouvrir</button>
                      <button class="small-btn" data-history-edit="${entry.id}">Renommer</button>
                    </div>
                  </div>
                `).join('') : emptyCards}
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderHistoryDetail(entry) {
    if (!entry) {
      return `
        <div class="page">
          <div class="page-label">Historique</div>
          <div class="surface"><div class="screen"><div class="center-stack">
            <div class="info-card" style="text-align:center">
              <h2 class="title-big">Résultat introuvable</h2>
              <button class="small-btn" data-action="go-history">Retour</button>
            </div>
          </div></div></div>
        </div>
      `;
    }
    return `
      <div class="page">
        <div class="page-label">Zoom - Historiques</div>
        <div class="surface">
          <div class="screen">
            <div class="topbar">
              <button class="small-btn" data-action="go-history">Retour</button>
              <div class="brand-wrap">
                <h1 class="brand" style="font-size:clamp(52px,6vw,88px)">${APP_TITLE}</h1>
                <p class="brand-sub" style="font-size:clamp(18px,2vw,32px)">Tiers List Maker</p>
              </div>
              <div class="meta-side">
                <button class="small-btn" data-history-edit="${entry.id}">Modifier le titre</button>
                <div class="players-count">${entry.playersCount} joueurs</div>
              </div>
            </div>

            <div style="text-align:center">
              <div class="label-top">Résultat</div>
              <div style="font-size:clamp(28px,3.4vw,46px);font-weight:500;line-height:1.15">${escapeHtml(entry.title)}</div>
              <div class="subtle">${escapeHtml(entry.theme)} · ${formatDate(entry.completedAt)}</div>
            </div>

            <div class="results-wrap">
              ${TIERS.map((tier) => {
                const rows = entry.results.filter((item) => item.finalTier === tier);
                return `
                  <div class="result-row">
                    <div class="tier-badge" style="background:${TIER_COLORS[tier]}">${tier}</div>
                    <div class="result-track">
                      ${rows.length ? rows.map((item) => `
                        <div class="score-chip">
                          <strong>${escapeHtml(item.name)}</strong>
                          <div>${item.score}%</div>
                          <div class="subtle-2">Somme : ${item.sum} pts</div>
                        </div>
                      `).join('') : '<div class="subtle">Aucun joueur ici.</div>'}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function render() {
    const ctx = currentContext();

    if (ctx.joinId && !ctx.roomId) {
      app.innerHTML = renderJoin(ctx.joinRoom);
      wireUI();
      return;
    }

    if (ctx.room && ctx.isAdmin) {
      sessionStorage.setItem(ADMIN_FLAG, '1');
      if (ctx.room.status === 'lobby') app.innerHTML = renderAdminLobby(ctx.room);
      else if (ctx.room.status === 'ranking') app.innerHTML = renderAdminWaiting(ctx.room);
      else app.innerHTML = renderAdminResults(ctx.room);
      wireUI();
      wireDnd();
      return;
    }

    if (ctx.room && ctx.player) {
      if (ctx.room.status === 'lobby') app.innerHTML = renderPlayerLobby(ctx.room, ctx.player);
      else if (ctx.room.status === 'ranking' && !ctx.player.submittedAt) app.innerHTML = renderPlayerRanking(ctx.room, ctx.player);
      else app.innerHTML = renderPlayerWaiting(ctx.room, ctx.player);
      wireUI();
      wireDnd();
      return;
    }

    if (ctx.hash === '#create') {
      app.innerHTML = renderCreate();
      wireUI();
      return;
    }

    if (ctx.hash.startsWith('#history/')) {
      const id = ctx.hash.replace('#history/', '');
      const entry = loadHistory().find((item) => item.id === id);
      app.innerHTML = renderHistoryDetail(entry);
      wireUI();
      return;
    }

    if (ctx.hash === '#history') {
      app.innerHTML = renderHistory();
      wireUI();
      return;
    }

    app.innerHTML = renderHome();
    wireUI();
  }

  function wireDnd() {
    document.querySelectorAll('.person-card').forEach((card) => {
      card.addEventListener('dragstart', () => {
        ui.draftDragItem = card.dataset.item;
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => {
        ui.draftDragItem = null;
        card.classList.remove('dragging');
      });
    });
    document.querySelectorAll('.dropzone').forEach((zone) => {
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const ctx = currentContext();
        if (!ctx.room || !ctx.player || !ui.draftDragItem) return;
        updateDraftPlacement(ctx.room.id, ctx.player.id, ui.draftDragItem, zone.dataset.tier);
      });
    });
  }

  function wireUI() {
    const themeInput = document.getElementById('theme-input');
    if (themeInput) themeInput.addEventListener('input', (e) => ui.createTheme = e.target.value);
    const historyInput = document.getElementById('history-title-input');
    if (historyInput) historyInput.addEventListener('input', (e) => ui.createHistoryTitle = e.target.value);
    const joinPseudo = document.getElementById('join-pseudo');
    if (joinPseudo) joinPseudo.addEventListener('input', (e) => ui.joinPseudo = e.target.value);

    document.querySelectorAll('[data-color]').forEach((btn) => {
      btn.addEventListener('click', () => {
        ui.joinColor = btn.dataset.color;
        render();
      });
    });

    document.querySelectorAll('[data-action]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const ctx = currentContext();

        if (action === 'go-home') return goHome();
        if (action === 'go-create') {
          window.location.hash = '#create';
          render();
          return;
        }
        if (action === 'go-history') {
          window.location.hash = '#history';
          render();
          return;
        }
        if (action === 'create-room') {
          const theme = (ui.createTheme || '').trim();
          if (!theme) return alert('Entre un thème pour la tier list.');
          createRoom({ theme, historyTitle: ui.createHistoryTitle || '' });
          return;
        }
        if (action === 'copy-link') {
          const input = document.getElementById('share-url');
          const value = input ? input.value : '';
          navigator.clipboard?.writeText(value).then(() => alert('Lien copié.')).catch(() => {
            if (input) { input.select(); document.execCommand('copy'); }
            alert('Lien copié.');
          });
          return;
        }
        if (action === 'join-room') {
          const pseudo = (ui.joinPseudo || '').trim();
          const roomId = ctx.joinId;
          const result = joinRoom(roomId, pseudo, ui.joinColor);
          if (!result.ok) alert(result.message);
          return;
        }
        if (action === 'leave-room') {
          if (ctx.room && ctx.player) leaveRoom(ctx.room.id, ctx.player.id);
          return;
        }
        if (action === 'start-room') {
          if (ctx.room) startRoom(ctx.room.id);
          return;
        }
        if (action === 'submit-ranking') {
          if (!ctx.room || !ctx.player) return;
          const result = submitDraft(ctx.room.id, ctx.player.id);
          if (!result.ok) alert(result.message);
          return;
        }
        if (action === 'edit-room-history-title') {
          if (!ctx.room) return;
          const next = prompt('Nouveau titre dans l’historique :', ctx.room.historyTitle || '');
          if (!next) return;
          ctx.room.historyTitle = next.trim();
          const rooms = loadRooms();
          rooms[ctx.room.id] = ctx.room;
          saveRooms(rooms);
          if (ctx.room.historySaved) saveRoomToHistory(ctx.room);
          render();
        }
      });
    });

    document.querySelectorAll('[data-move-item]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const ctx = currentContext();
        if (!ctx.room || !ctx.player) return;
        updateDraftPlacement(ctx.room.id, ctx.player.id, btn.dataset.moveItem, btn.dataset.targetTier);
      });
    });

    document.querySelectorAll('[data-history-open]').forEach((btn) => {
      btn.addEventListener('click', () => {
        window.location.hash = '#history/' + btn.dataset.historyOpen;
        render();
      });
    });

    document.querySelectorAll('[data-history-edit]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const history = loadHistory();
        const entry = history.find((item) => item.id === btn.dataset.historyEdit);
        if (!entry) return;
        const next = prompt('Modifier le titre de cet historique :', entry.title);
        if (!next) return;
        updateHistoryTitle(entry.id, next);
      });
    });
  }

  window.addEventListener('hashchange', render);
  window.addEventListener('storage', (e) => {
    if ([STORAGE_KEY, HISTORY_KEY].includes(e.key)) render();
  });
  if (bc) bc.addEventListener('message', render);

  render();
})();
</script>
</body>
</html>
